# yaml-language-server: $schema=../../../../.vscode/spring-boot-schema.json
spring:
  application:
    name: icolsystem

  # ===============================
  # CONFIGURAÇÕES DO BANCO DE DADOS
  # ===============================
  datasource:
    url: jdbc:postgresql://localhost:5432/icol_db
    username: postgres
    password: adm123
    driver-class-name: org.postgresql.Driver

  # ===============================
  # CONFIGURAÇÕES DO JPA / HIBERNATE
  # ===============================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          use_get_generated_keys: true

# ===============================
# CONFIGURAÇÕES DO SERVIDOR
# ===============================
server:
  port: 6060
  servlet:
    context-path: /api

# ===============================
# CONFIGURAÇÕES DE SEGURANÇA (JWT)
# ===============================
jwt:
  secret: 4f5a8substituaporumachavesecretalongadeverdade9d2c1
  expiration: 86400000